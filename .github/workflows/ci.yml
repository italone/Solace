name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release readiness
        run: pnpm release:readiness

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck JSX dev runtime
        run: pnpm typecheck:jsxdev

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Package exports
        run: pnpm test:package

      - name: Coverage
        run: pnpm test:coverage

      - name: Package consumer smoke
        run: pnpm package:smoke

      - name: Benchmark smoke
        run: pnpm benchmark

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser benchmark
        run: pnpm benchmark:browser

      - name: E2E
        run: pnpm test:e2e
